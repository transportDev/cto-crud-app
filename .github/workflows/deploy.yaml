name: Deploy (self-hosted, port 80/8081)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: self-hosted

    env:
      PROD_PATH: ${{ secrets.PROD_PATH }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      # Optional (non-sensitive)
      PROD_APP_NAME: ${{ secrets.PROD_APP_NAME }}
      PROD_APP_URL: ${{ secrets.PROD_APP_URL }}

    steps:
      - name: Validate required secrets
        run: |
          missing=0
          for v in PROD_PATH DB_DATABASE DB_USERNAME DB_PASSWORD MYSQL_ROOT_PASSWORD; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret: $v"; missing=1; fi
          done
          case "$PROD_PATH" in /*) ;; *) echo "::error::PROD_PATH must be an absolute path (e.g., /home/user/app)"; missing=1;; esac
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker Compose plugin (user-space)
        run: |
          set -eo pipefail
          if docker ps >/dev/null 2>&1; then DOCKER="docker"; else DOCKER="sudo docker"; fi
          echo "DOCKER=$DOCKER" >> $GITHUB_ENV

          if ! $DOCKER compose version >/dev/null 2>&1; then
            mkdir -p ~/.docker/cli-plugins
            curl -sSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
              -o ~/.docker/cli-plugins/docker-compose
            chmod +x ~/.docker/cli-plugins/docker-compose
          fi

      - name: Sync repo to target dir
        run: |
          set -eo pipefail
          mkdir -p "$PROD_PATH"
          if command -v rsync >/dev/null 2>&1; then
            rsync -rlgoDzvc --delete --exclude-from=.deployignore ./ "$PROD_PATH"/
          else
            echo "rsync not found; using tar fallback (no --delete)."
            tar -cf - --exclude-vcs -X .deployignore . | tar -C "$PROD_PATH" -xf -
          fi

      - name: Write/Update Compose .env (includes proxy)
        run: |
          set -eo pipefail
          cd "$PROD_PATH"
          touch .env
          sed -i 's/\r$//' .env || true

          set_kv() {
            KEY="$1"; VAL="$2"
            if grep -Eq "^${KEY}[[:space:]]*[:=]" .env; then
              sed -i -E "s#^${KEY}[[:space:]]*[:=][[:space:]]*.*#${KEY}=${VAL}#g" .env
            else
              echo "${KEY}=${VAL}" >> .env
            fi
          }

          # DB for app
          set_kv DB_HOST "mysql"
          set_kv DB_PORT "3306"
          set_kv DB_DATABASE "${DB_DATABASE}"
          set_kv DB_USERNAME "${DB_USERNAME}"
          set_kv DB_PASSWORD "${DB_PASSWORD}"

          # MySQL init (first run only)
          set_kv MYSQL_ROOT_PASSWORD "${MYSQL_ROOT_PASSWORD}"
          set_kv MYSQL_DATABASE "${DB_DATABASE}"
          set_kv MYSQL_USER "${DB_USERNAME}"
          set_kv MYSQL_PASSWORD "${DB_PASSWORD}"

          # Proxy for build/runtime (edit/remove if not using a proxy)
          set_kv HTTP_PROXY "http://10.2.120.222:8100"
          set_kv HTTPS_PROXY "http://10.2.120.222:8100"
          set_kv NO_PROXY "localhost,127.0.0.1,::1,app,nginx,mysql,phpmyadmin"

          # Optional app metadata
          [ -n "${PROD_APP_NAME}" ] && set_kv APP_NAME "${PROD_APP_NAME}"
          [ -n "${PROD_APP_URL}" ] && set_kv APP_URL "${PROD_APP_URL}"

          # Host UID/GID for permissions
          set_kv UID "$(id -u)"
          set_kv GID "$(id -g)"

      - name: Ensure override for ports 80/8081 (if file missing)
        run: |
          set -eo pipefail
          cd "$PROD_PATH"
          if [ ! -f docker-compose.override.yml ]; then
            cat > docker-compose.override.yml <<'YAML'
            services:
              nginx:
                ports:
                  - "80:80"
              phpmyadmin:
                ports:
                  - "8081:80"
            YAML
          fi

      - name: (Optional) Open firewall ports 80 and 8081
        run: |
          set -eo pipefail
          if command -v ufw >/dev/null 2>&1; then
            sudo ufw allow 80/tcp || true
            sudo ufw allow 8081/tcp || true
            sudo ufw reload || true
          else
            echo "ufw not installed; ensure ports 80 and 8081 are reachable."
          fi

      - name: Bring up containers
        run: |
          set -eo pipefail
          cd "$PROD_PATH"
          $DOCKER compose up -d --build

      - name: Prepare Laravel and deploy
        run: |
          set -eo pipefail
          cd "$PROD_PATH"

          $DOCKER compose exec -T app bash -lc '
            set -e
            cd /var/www/html
            cp -n .env.example .env || true
            sed -i "s/\r$//" .env || true

            set_kv(){ k="$1"; v="$2"; if grep -Eq "^$k[[:space:]]*[:=]" .env; then sed -i -E "s#^$k[[:space:]]*[:=][[:space:]]*.*#$k=$v#g" .env; else echo "$k=$v" >> .env; fi; }

            set_kv APP_ENV production
            [ -n "$APP_NAME" ] && set_kv APP_NAME "$APP_NAME"
            [ -n "$APP_URL" ] && set_kv APP_URL "$APP_URL"

            set_kv DB_CONNECTION "${DB_CONNECTION:-mysql}"
            set_kv DB_HOST "${DB_HOST:-mysql}"
            set_kv DB_PORT "${DB_PORT:-3306}"
            set_kv DB_DATABASE "${DB_DATABASE}"
            set_kv DB_USERNAME "${DB_USERNAME}"
            set_kv DB_PASSWORD "${DB_PASSWORD}"

            mkdir -p storage/logs bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache || true
            chown -R www-data:www-data storage bootstrap/cache || true
            php artisan key:generate --ansi || true
          '

          $DOCKER compose exec -T app php artisan down --render=errors::503 || true
          $DOCKER compose exec -T app composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader
          $DOCKER compose exec -T app php artisan migrate --force
          $DOCKER compose exec -T app php artisan config:clear || true
          $DOCKER compose exec -T app php artisan cache:clear || true
          $DOCKER compose exec -T app php artisan route:clear || true
          $DOCKER compose exec -T app php artisan view:clear || true
          $DOCKER compose exec -T app php artisan config:cache || true
          $DOCKER compose exec -T app php artisan route:cache || true
          $DOCKER compose exec -T app php artisan view:cache || true
          $DOCKER compose exec -T app php artisan up || true
